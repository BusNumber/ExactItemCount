name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: lunarmodules/luacheck@v1

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install LuaJIT
        run: sudo apt-get update && sudo apt-get install -y luajit
      # Byte-compile every Lua file first: a syntax error then fails with a clean
      # per-file message instead of mid-suite.
      - name: Syntax check
        run: |
          for f in *.lua tests/*.lua; do
            luajit -bl "$f" > /dev/null || exit 1
          done
      - name: Run tests
        run: luajit tests/run_tests.lua
